<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arthouse — v5</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#d4a843;
  --amber:#e8891a;
  --white:#f0ece2;
  --dim:rgba(240,236,226,0.7);
  --green:#4ade80;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Mono', monospace;background:#050505;color:var(--white);overflow-x:hidden;}
canvas{position:fixed; inset:0; z-index:-1;}
.section{min-height:100vh; padding:120px 10vw; display:flex; flex-direction:column; justify-content:center;}
h1,h2{font-family:'Playfair Display', serif;font-size:clamp(48px,9vw,110px);line-height:.9;}
.brand{position:fixed;top:20px;left:30px;font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);z-index:50;letter-spacing:.1em}
.gold{color:var(--gold)}
.amber{color:var(--amber)}
p{max-width:640px;margin-top:24px;color:var(--dim);line-height:1.8;}
.reveal{opacity:0; transform:translateY(40px); transition:1.2s cubic-bezier(.16,1,.3,1);}
.reveal.active{opacity:1; transform:translateY(0);}
.cta{margin-top:20px;padding:18px 32px;background:linear-gradient(90deg,var(--gold),var(--amber));color:#000;text-decoration:none;font-weight:bold;letter-spacing:.1em;display:inline-block;border:none;cursor:pointer}
.input-box{margin-top:30px;padding:16px;background:#0f0f0d;border:1px solid rgba(255,255,255,.1);width:100%;max-width:500px;color:#fff}
.result{margin-top:20px;font-size:14px;color:var(--green)}
.small{font-size:12px;color:var(--dim)}
</style>
</head>
<body>

<div class="brand">arthouse</div>

<canvas id="bg"></canvas>

<section class="section">
  <h1 class="reveal">Signal or <span class="gold">noise</span>.<br>We decide.</h1>
  <p class="reveal">AI-powered cultural filter for artists & collectors.</p>

  <input id="input" class="input-box reveal" placeholder="Paste NFT / tweet / idea..." />
  <button class="cta reveal" onclick="analyze()">Analyze</button>
  <button class="cta reveal" onclick="generateImage()">Generate Share Card</button>

  <div id="result" class="result"></div>
  <canvas id="card" width="400" height="400" style="margin-top:20px;border:1px solid #222"></canvas>

  <a href="https://t.me/arthousexbt_bot" class="cta reveal">Continue in Telegram</a>
  <p class="small reveal">Deeper critique. Memory. Collector intelligence.</p>
</section>

<section class="section">
  <h2 class="reveal">Onchain Layer</h2>
  <button class="cta reveal" onclick="connectWallet()">Connect Wallet</button>
  <div id="wallet" class="small"></div>
</section>

<section class="section">
  <h2 class="reveal">Leaderboard</h2>
  <div class="result reveal" id="leaderboard"></div>
</section>

<section class="section">
  <a href="https://orynth.dev/projects/arthousebot" target="_blank">
    <img src="https://orynth.dev/api/badge/arthousebot?theme=light&style=default" width="140" />
  </a>
</section>

<script>
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
let w,h,t=0;
function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}resize();
window.addEventListener("resize",resize);
function draw(){t+=0.01;ctx.fillStyle="#050505";ctx.fillRect(0,0,w,h);
for(let i=0;i<3;i++){ctx.beginPath();for(let x=0;x<w;x+=20){const y=h/2+Math.sin(x*0.002+t+i)*80;ctx.lineTo(x,y);}ctx.strokeStyle=`rgba(212,168,67,${0.1+i*0.05})`;ctx.stroke();}
requestAnimationFrame(draw);}draw();

const reveals=document.querySelectorAll(".reveal");
function reveal(){const trigger=window.innerHeight*0.85;reveals.forEach(el=>{if(el.getBoundingClientRect().top<trigger){el.classList.add("active");}});}window.addEventListener("scroll",reveal);reveal();

let lastResult="";

async function analyze(){
  const val=document.getElementById("input").value;
  const result=document.getElementById("result");
  result.innerHTML="analyzing...";

  const res = await fetch("/api/analyze",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({input: val})
  });

  const data = await res.json();
  lastResult = data.result;
  result.innerHTML = lastResult;

  updateLeaderboard(lastResult);
}

function generateImage(){
  if(!lastResult) return;
  const canvas=document.getElementById("card");
  const ctx=canvas.getContext("2d");

  ctx.fillStyle="#050505";
  ctx.fillRect(0,0,400,400);

  ctx.fillStyle="#d4a843";
  ctx.font="20px Playfair Display";
  ctx.fillText("arthouse",20,40);

  ctx.fillStyle="#ffffff";
  ctx.font="14px monospace";

  const lines = lastResult.split("|");
  lines.forEach((l,i)=>{
    ctx.fillText(l.trim(),20,120 + i*30);
  });
}

function connectWallet(){
  document.getElementById("wallet").innerHTML="Wallet connected (ready for onchain scoring)";
}

let leaderboardData=[];
function updateLeaderboard(res){
  leaderboardData.push(res);
  const el=document.getElementById("leaderboard");
  el.innerHTML = leaderboardData.slice(-3).map((r,i)=>`#${i+1} ${r}`).join("<br>");
}
</script>

</body>
</html>
